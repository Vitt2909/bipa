<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BIPA — Recibo da Venda 0001</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
      <link rel="manifest" href="/manifest.json" />
  </head>
  <body data-page="pdv-receipt" data-theme="workspace">
    <header class="app-topbar">
      <div class="app-topbar__brand">
        <span class="brand-mark brand-mark--svg" aria-hidden="true"><svg viewBox="0 0 64 64" role="presentation" focusable="false"><defs><linearGradient id="bGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#32ffb4"/><stop offset="100%" stop-color="#0fd68c"/></linearGradient></defs><rect x="3" y="3" width="58" height="58" rx="18" fill="url(#bGrad)"/><path d="M40.5 19.5H25.2c-3.9 0-7.1 3.2-7.1 7.1v10.8c0 6 4.9 10.9 10.9 10.9h8.8c6 0 10.9-4.9 10.9-10.9v-0.2c0-4.4-2.7-8.3-6.8-9.9 2-1.6 3.3-4 3.3-6.7v-0.1c0-5.8-4.7-10.5-10.5-10.5Z" fill="#052216" opacity="0.85"/></svg></span>
        <div class="app-topbar__context">
          <span class="app-topbar__name">BIPA</span>
          <span class="app-topbar__store">Loja Demo — Recibo</span>
        </div>
      </div>
      <nav class="app-topbar__actions" aria-label="Ações rápidas">
        <a class="btn btn--surface" href="/app/pdv/">Iniciar nova venda</a>
        <a class="btn btn--ghost" href="/">Sair</a>
      </nav>
    </header>

    <main class="receipt-shell" aria-labelledby="receipt-title">
      <section class="receipt-card">
        <header class="receipt-card__header">
          <h1 class="receipt-card__title" id="receipt-title">Carregando recibo...</h1>
          <p class="receipt-card__meta" id="receipt-meta"></p>
        </header>

        <section class="receipt-section" aria-labelledby="receipt-items-title">
          <h2 class="receipt-section__title" id="receipt-items-title">Itens</h2>
          <table class="table">
            <thead>
              <tr>
                <th scope="col">Produto</th>
                <th scope="col">Qtd.</th>
                <th scope="col">Preço</th>
                <th scope="col">Subtotal</th>
              </tr>
            </thead>
            <tbody id="receipt-tbody">
              <!-- Rendered by JS -->
            </tbody>
          </table>
        </section>

        <section class="receipt-section" aria-labelledby="receipt-payment-title">
          <h2 class="receipt-section__title" id="receipt-payment-title">Pagamento</h2>
          <dl class="key-value">
            <div>
              <dt>Cliente</dt>
              <dd id="receipt-customer"></dd>
            </div>
            <div>
              <dt>Forma</dt>
              <dd id="receipt-method"></dd>
            </div>
            <div>
              <dt>Desconto aplicado</dt>
              <dd id="receipt-discount"></dd>
            </div>
            <div>
              <dt>Total pago</dt>
              <dd id="receipt-total"></dd>
            </div>
          </dl>
        </section>

        <footer class="receipt-card__footer">
          <button class="btn btn--surface" type="button">Enviar por WhatsApp</button>
          <button class="btn btn--ghost" type="button">Imprimir recibo</button>
        </footer>
      </section>
    </main>

    <script src="/script.js" defer></script>
  </body>
</html>
