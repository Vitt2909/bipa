<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BIPA — Selecione o módulo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
      <link rel="manifest" href="/manifest.json" />
  </head>
  <body data-page="module-select" data-theme="workspace">
    <header class="app-topbar">
      <div class="app-topbar__brand">
        <span class="brand-mark brand-mark--svg" aria-hidden="true"><svg viewBox="0 0 64 64" role="presentation" focusable="false"><defs><linearGradient id="bGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#32ffb4"/><stop offset="100%" stop-color="#0fd68c"/></linearGradient></defs><rect x="3" y="3" width="58" height="58" rx="18" fill="url(#bGrad)"/><path d="M40.5 19.5H25.2c-3.9 0-7.1 3.2-7.1 7.1v10.8c0 6 4.9 10.9 10.9 10.9h8.8c6 0 10.9-4.9 10.9-10.9v-0.2c0-4.4-2.7-8.3-6.8-9.9 2-1.6 3.3-4 3.3-6.7v-0.1c0-5.8-4.7-10.5-10.5-10.5Z" fill="#052216" opacity="0.85"/></svg></span>
        <span class="app-topbar__name">BIPA</span>
      </div>
      <nav class="app-topbar__actions" aria-label="Ações rápidas">
        <a class="btn btn--surface" href="/app/pdv/">Ir para PDV</a>
        <button class="btn btn--ghost" type="button">Sair</button>
      </nav>
    </header>

    <main class="module-select" aria-labelledby="module-title">
      <div class="module-select__card">
        <h1 class="module-select__title" id="module-title">Escolha por onde quer começar</h1>
        <p class="module-select__subtitle">Dados fictícios carregados automaticamente para demonstração.</p>

        <div class="module-select__grid">
          <a class="module-card" href="/app/pdv/">
            <span class="module-card__badge">PDV</span>
            <h2 class="module-card__title">Vendas</h2>
            <p class="module-card__description">Caixa rápido, otimizado para tablet e celular.</p>
          </a>

          <a class="module-card" href="/app/admin/dashboard/">
            <span class="module-card__badge">Admin</span>
            <h2 class="module-card__title">Gestão</h2>
            <p class="module-card__description">Dashboards, estoque, clientes e financeiro.</p>
          </a>
        </div>
      </div>
    </main>

    <script src="/script.js" defer></script>
  </body>
</html>
