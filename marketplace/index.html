<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BIPA — Marketplace B2B de Moda Circular</title>
    <meta name="description" content="Liquide estoque parado ou compre lotes para sua loja no BIPA Marketplace B2B." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body data-page="marketplace" data-theme="workspace">
    <header class="app-topbar">
      <div class="app-topbar__brand">
        <span class="brand-mark brand-mark--svg" aria-hidden="true">
          <svg viewBox="0 0 64 64" role="presentation" focusable="false">
            <defs><linearGradient id="mkGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#32ffb4"/><stop offset="100%" stop-color="#0fd68c"/></linearGradient></defs>
            <rect x="3" y="3" width="58" height="58" rx="18" fill="url(#mkGrad)"/>
            <path d="M40.5 19.5H25.2c-3.9 0-7.1 3.2-7.1 7.1v10.8c0 6 4.9 10.9 10.9 10.9h8.8c6 0 10.9-4.9 10.9-10.9v-0.2c0-4.4-2.7-8.3-6.8-9.9 2-1.6 3.3-4 3.3-6.7v-0.1c0-5.8-4.7-10.5-10.5-10.5Z" fill="#052216" opacity="0.85"/>
          </svg>
        </span>
        <div class="app-topbar__context">
          <span class="app-topbar__name">BIPA</span>
          <span class="app-topbar__store">Marketplace B2B</span>
        </div>
      </div>
      <nav class="app-topbar__actions" aria-label="Ações rápidas">
        <a class="btn btn--surface" href="/app/admin/dashboard/">Voltar ao Gestor</a>
        <a class="btn btn--ghost" href="/">Sair</a>
      </nav>
    </header>

    <main class="marketplace-shell">
      <div class="marketplace-hero">
        <h1 class="page-title">Marketplace de Repasse</h1>
        <p class="page-subtitle">Liquide estoque parado ou compre lotes para sua loja</p>
        <div class="marketplace-hero__metrics">
          <div class="metric-card">
            <h2>Peças Ativas</h2>
            <p class="metric-card__value" id="marketplace-metric-active">—</p>
          </div>
          <div class="metric-card">
            <h2>Propostas Abertas</h2>
            <p class="metric-card__value" id="marketplace-metric-offers">—</p>
          </div>
          <div class="metric-card">
            <h2>Ticket Médio</h2>
            <p class="metric-card__value" id="marketplace-metric-ticket">—</p>
          </div>
        </div>
      </div>

      <div class="marketplace-layout">
        <aside class="marketplace-sidebar">
          <form id="marketplace-filters" class="marketplace-filters">
            <h2 class="marketplace-filters__title">Filtros</h2>
            <input type="search" id="marketplace-search-input" placeholder="Buscar peça, loja..." class="marketplace-input" />
            <select id="marketplace-filter-category" class="marketplace-input"><option value="todos">Categoria: Todas</option></select>
            <select id="marketplace-filter-size" class="marketplace-input"><option value="todos">Tamanho: Todos</option></select>
            <select id="marketplace-filter-condition" class="marketplace-input"><option value="todos">Condição: Todas</option></select>
            <select id="marketplace-filter-location" class="marketplace-input"><option value="todos">Localização: Todas</option></select>
            <div class="marketplace-filters__range">
              <label>Preço máximo</label>
              <input type="range" id="marketplace-filter-price" min="0" max="1000" step="10" value="1000" />
              <p id="marketplace-filter-price-output" class="marketplace-filters__price-label"></p>
            </div>
            <button type="reset" class="btn btn--surface">Limpar Filtros</button>
          </form>
        </aside>
        
        <div class="marketplace-content">
          <h2 id="marketplace-results-count" class="marketplace-content__count">Carregando peças...</h2>
          <div id="marketplace-listings" class="marketplace-grid">
            <!-- JS Renders -->
          </div>
        </div>
      </div>
    </main>

    <div class="demo-badge-fixed" aria-hidden="true">MODO DEMO</div>
    <script src="/script.js" defer></script>
  </body>
</html>
